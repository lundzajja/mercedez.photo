<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#080808" rx="22"/>

  <defs>
    <mask id="ring">
      <circle cx="50" cy="50" r="43" fill="white"/>
      <circle cx="50" cy="50" r="16" fill="black"/>
    </mask>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 6 aperture blades clipped to ring -->
  <g mask="url(#ring)" transform="translate(50,50)" filter="url(#glow)">
    <rect x="-10" y="-43" width="20" height="43" fill="#39FF14" transform="rotate(0)"/>
    <rect x="-10" y="-43" width="20" height="43" fill="#39FF14" transform="rotate(60)"/>
    <rect x="-10" y="-43" width="20" height="43" fill="#39FF14" transform="rotate(120)"/>
    <rect x="-10" y="-43" width="20" height="43" fill="#39FF14" transform="rotate(180)"/>
    <rect x="-10" y="-43" width="20" height="43" fill="#39FF14" transform="rotate(240)"/>
    <rect x="-10" y="-43" width="20" height="43" fill="#39FF14" transform="rotate(300)"/>
  </g>

  <!-- Outer ring border -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#39FF14" stroke-width="2.5"/>

  <!-- Inner lens element -->
  <circle cx="50" cy="50" r="16" fill="#080808" stroke="#39FF14" stroke-width="2"/>
  <circle cx="50" cy="50" r="5" fill="#39FF14"/>
</svg>
