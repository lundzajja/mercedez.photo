<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>

    <!-- Aperture blade mask -->
    <mask id="ring">
      <circle cx="880" cy="315" r="240" fill="white"/>
      <circle cx="880" cy="315" r="88" fill="black"/>
    </mask>

    <!-- Neon glow -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for text -->
    <filter id="text-glow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Radial fade for aperture bg -->
    <radialGradient id="lens-bg" cx="880" cy="315" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle left glow -->
  <ellipse cx="200" cy="315" rx="350" ry="250" fill="#39FF14" opacity="0.03"/>

  <!-- Right aperture glow -->
  <circle cx="880" cy="315" r="280" fill="url(#lens-bg)"/>

  <!-- ═══ APERTURE ICON ═══ -->
  <!-- 6 blades -->
  <g mask="url(#ring)" transform="translate(880,315)" filter="url(#neon-glow)">
    <rect x="-54" y="-240" width="108" height="240" fill="#39FF14" transform="rotate(0)"/>
    <rect x="-54" y="-240" width="108" height="240" fill="#39FF14" transform="rotate(60)"/>
    <rect x="-54" y="-240" width="108" height="240" fill="#39FF14" transform="rotate(120)"/>
    <rect x="-54" y="-240" width="108" height="240" fill="#39FF14" transform="rotate(180)"/>
    <rect x="-54" y="-240" width="108" height="240" fill="#39FF14" transform="rotate(240)"/>
    <rect x="-54" y="-240" width="108" height="240" fill="#39FF14" transform="rotate(300)"/>
  </g>

  <!-- Outer ring -->
  <circle cx="880" cy="315" r="240" fill="none" stroke="#39FF14" stroke-width="3" filter="url(#neon-glow)"/>

  <!-- Inner circle -->
  <circle cx="880" cy="315" r="88" fill="#080808" stroke="#39FF14" stroke-width="3"/>

  <!-- Center dot -->
  <circle cx="880" cy="315" r="20" fill="#39FF14" filter="url(#neon-glow)"/>

  <!-- ═══ TEXT LEFT ═══ -->
  <!-- "fotograf" label -->
  <text x="80" y="210"
    font-family="'Space Mono', monospace"
    font-size="18"
    font-weight="400"
    fill="#39FF14"
    letter-spacing="6">FOTOGRAF</text>

  <!-- Name -->
  <text x="72" y="330"
    font-family="'Space Grotesk', 'Arial', sans-serif"
    font-size="110"
    font-weight="700"
    fill="#e2e2e2"
    letter-spacing="-4">Luka</text>

  <text x="72" y="450"
    font-family="'Space Grotesk', 'Arial', sans-serif"
    font-size="110"
    font-weight="700"
    fill="#39FF14"
    letter-spacing="-4"
    filter="url(#text-glow)">Matić</text>

  <!-- Domain -->
  <text x="80" y="530"
    font-family="'Space Mono', monospace"
    font-size="24"
    font-weight="400"
    fill="#444"
    letter-spacing="2">mercedez.photo</text>

  <!-- Separator line -->
  <rect x="80" y="170" width="60" height="3" fill="#39FF14" filter="url(#neon-glow)"/>

  <!-- Bottom border line -->
  <rect x="0" y="617" width="1200" height="3" fill="#39FF14" opacity="0.6"/>
</svg>
